<!DOCTYPE html>

<body>

    <h1>Smash Sauce</h1>
    <h2>Ingredients</h2>
    <ul>
        <li>1/4 cup Mayo</li>
        <li>1 tbsp Ketchup</li>
        <li>1 tsp Dijon mustard (I recommend Grey Poupon)</li>
        <li>2 tsp Garlic powder</li>
        <li>1 tbsp sweet relish</li>
        <li>1/4 tsp white Vinegar (optional)</li>
    </ul>


</body>
